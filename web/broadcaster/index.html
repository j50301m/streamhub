<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Broadcaster</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { margin-bottom: 20px; color: #e94560; }
        .container { max-width: 900px; margin: 0 auto; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #eee; font-size: 14px; }
        input#api-url { width: 300px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button.primary { background: #e94560; color: #fff; }
        button.primary:hover { background: #c73e54; }
        button.secondary { background: #0f3460; color: #fff; }
        button.secondary:hover { background: #1a4a7a; }
        button.danger { background: #666; color: #fff; }
        button.danger:hover { background: #888; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        video { width: 100%; max-width: 800px; background: #000; border-radius: 8px; margin-bottom: 10px; }
        .status { padding: 10px; background: #16213e; border-radius: 4px; margin-top: 10px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        label { font-size: 14px; color: #aaa; min-width: 70px; }
        .section { border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .section h2 { font-size: 16px; margin-bottom: 10px; color: #aaa; }
        .section.disabled { opacity: 0.4; pointer-events: none; }
        .user-info { font-size: 13px; color: #4ecca3; margin-bottom: 10px; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { padding: 6px 14px; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 13px; background: #16213e; color: #aaa; }
        .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
        .streams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .streams-empty { color: #666; font-size: 14px; padding: 16px 0; }
        .stream-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 12px; }
        .stream-card .card-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; object-fit: cover; background: #222; }
        .stream-card .card-thumb-placeholder { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; background: #222; display: flex; align-items: center; justify-content: center; }
        .stream-card .card-thumb-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }
        .stream-card .card-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stream-card .card-status { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .status-pending { background: #555; color: #ccc; }
        .status-live { background: #e94560; color: #fff; }
        .status-ended { background: #4ecdc4; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>StreamHub Broadcaster</h1>

        <div class="controls">
            <label>API URL:</label>
            <input type="text" id="api-url" value="" />
        </div>

        <!-- Auth Section -->
        <div class="section" id="auth-section">
            <h2>1. Login / Register</h2>
            <div id="auth-form">
                <div class="tab-bar">
                    <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                    <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
                </div>
                <div class="controls">
                    <label>Email:</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" />
                </div>
                <div class="controls">
                    <label>Password:</label>
                    <input type="password" id="auth-password" placeholder="min 8 chars" />
                </div>
                <div class="controls">
                    <button class="primary" id="btn-auth" onclick="doAuth()">Login</button>
                </div>
            </div>
            <div id="user-info" style="display:none;">
                <div class="user-info" id="user-display"></div>
                <button class="danger" onclick="doLogout()">Logout</button>
            </div>
        </div>

        <!-- Stream Section -->
        <div class="section disabled" id="stream-section">
            <h2>2. Create Stream</h2>
            <div class="controls">
                <label>Title:</label>
                <input type="text" id="stream-title" placeholder="My Stream" />
                <button class="primary" id="btn-create" onclick="createStream()">Create Stream</button>
            </div>
            <div class="controls" id="stream-info" style="display:none;">
                <label>Key:</label>
                <input type="text" id="stream-key" readonly style="width:320px" />
            </div>
        </div>

        <!-- Streaming Section -->
        <div class="section disabled" id="streaming-section">
            <h2>3. Go Live</h2>
            <div class="controls">
                <button class="primary" id="btn-start" onclick="startStreaming()">Start Streaming</button>
                <button class="danger" id="btn-stop" onclick="stopStreaming()" disabled>Stop</button>
            </div>
            <video id="preview" autoplay muted playsinline></video>
        </div>

        <!-- My Streams Section -->
        <div class="section disabled" id="my-streams-section">
            <h2>My Streams</h2>
            <div id="my-streams-grid" class="streams-grid">
                <div class="streams-empty">Login to see your streams</div>
            </div>
        </div>

        <div class="status" id="log">Ready. Please login or register first.</div>
    </div>

    <script>
        let accessToken = null;
        let refreshToken = null;
        let currentUser = null;
        let currentStreamId = null;
        let currentStreamKey = null;
        let pc = null;
        let localStream = null;
        let authMode = 'login';
        let mediamtxBase = '';
        let thumbnailInterval = null;

        // Detect environment: if served via nginx (port 3000), use proxy paths
        // Otherwise (direct file open or other port), use direct localhost URLs
        function detectUrls() {
            const loc = window.location;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                // Served via a web server — use relative proxy paths
                document.getElementById('api-url').value = loc.origin + '/api';
                mediamtxBase = loc.origin + '/mediamtx';
            } else {
                // Opened as a file or unknown — use direct localhost
                document.getElementById('api-url').value = 'http://localhost:8080';
                mediamtxBase = 'http://localhost:8889';
            }
        }
        detectUrls();

        function log(msg) {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleTimeString();
            el.textContent += '\n[' + ts + '] ' + msg;
            el.scrollTop = el.scrollHeight;
        }

        function apiUrl() { return document.getElementById('api-url').value; }

        function authHeaders() {
            const h = { 'Content-Type': 'application/json' };
            if (accessToken) h['Authorization'] = 'Bearer ' + accessToken;
            return h;
        }

        function switchTab(mode) {
            authMode = mode;
            document.getElementById('tab-login').className = mode === 'login' ? 'tab active' : 'tab';
            document.getElementById('tab-register').className = mode === 'register' ? 'tab active' : 'tab';
            document.getElementById('btn-auth').textContent = mode === 'login' ? 'Login' : 'Register';
        }

        async function doAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) { log('Please enter email and password.'); return; }

            const endpoint = authMode === 'login' ? '/v1/auth/login' : '/v1/auth/register';
            const body = authMode === 'login'
                ? { email, password }
                : { email, password, role: 'broadcaster' };

            try {
                const res = await fetch(apiUrl() + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const json = await res.json();

                if (!res.ok) {
                    log(authMode + ' failed: ' + (json.error?.message || res.status));
                    return;
                }

                accessToken = json.data.access_token;
                refreshToken = json.data.refresh_token;
                currentUser = json.data.user;

                document.getElementById('auth-form').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('user-display').textContent =
                    'Logged in as: ' + currentUser.email + ' (' + currentUser.role + ')';

                document.getElementById('stream-section').classList.remove('disabled');
                log('Logged in as ' + currentUser.email);
                fetchMyStreams();
            } catch (e) {
                log('Auth error: ' + e.message);
            }
        }

        function doLogout() {
            accessToken = null;
            refreshToken = null;
            currentUser = null;
            currentStreamId = null;
            currentStreamKey = null;

            document.getElementById('auth-form').style.display = 'block';
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('stream-section').classList.add('disabled');
            document.getElementById('streaming-section').classList.add('disabled');
            document.getElementById('stream-info').style.display = 'none';
            document.getElementById('btn-create').disabled = false;

            stopStreaming();
            log('Logged out.');
        }

        async function createStream() {
            const title = document.getElementById('stream-title').value || null;

            try {
                const res = await fetch(apiUrl() + '/v1/streams', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ title })
                });
                const json = await res.json();

                if (!res.ok) {
                    log('Create stream failed: ' + (json.error?.message || res.status));
                    return;
                }

                const stream = json.data;
                currentStreamId = stream.id;
                currentStreamKey = stream.stream_key;
                document.getElementById('stream-key').value = currentStreamKey;
                document.getElementById('stream-info').style.display = 'flex';
                document.getElementById('btn-create').disabled = true;

                document.getElementById('streaming-section').classList.remove('disabled');

                log('Stream created: ' + currentStreamKey);
                fetchMyStreams();

                // Start camera preview
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('preview').srcObject = localStream;
                log('Camera ready.');
            } catch (e) {
                log('Error: ' + e.message);
            }
        }

        async function startStreaming() {
            if (!currentStreamId || !localStream) return;

            try {
                // Get push token from API
                log('Requesting push token...');
                const tokenRes = await fetch(apiUrl() + '/v1/streams/' + currentStreamId + '/token', {
                    method: 'POST',
                    headers: authHeaders()
                });
                const tokenJson = await tokenRes.json();

                if (!tokenRes.ok) {
                    log('Token error: ' + (tokenJson.error?.message || tokenRes.status));
                    return;
                }

                const pushToken = tokenJson.data.token;
                const whipUrl = mediamtxBase + '/' + currentStreamKey + '/whip?token=' + pushToken;

                log('Got push token, connecting WHIP...');

                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') { resolve(); return; }
                    pc.addEventListener('icegatheringstatechange', () => {
                        if (pc.iceGatheringState === 'complete') resolve();
                    });
                });

                const res = await fetch(whipUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });

                if (!res.ok) {
                    log('WHIP error: ' + res.status + ' ' + await res.text());
                    return;
                }

                const answerSdp = await res.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-stop').disabled = false;
                log('Streaming live!');

                // Start periodic canvas thumbnail capture (every 30s)
                startThumbnailCapture();
            } catch (e) {
                log('Streaming error: ' + e.message);
            }
        }

        function startThumbnailCapture() {
            if (thumbnailInterval) clearInterval(thumbnailInterval);
            thumbnailInterval = setInterval(async function() {
                try {
                    var video = document.getElementById('preview');
                    if (!video.videoWidth || !video.videoHeight) return;
                    var canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    var blob = await new Promise(function(resolve) {
                        canvas.toBlob(resolve, 'image/jpeg', 0.7);
                    });
                    if (!blob || !currentStreamId) return;
                    await fetch(apiUrl() + '/v1/streams/' + currentStreamId + '/thumbnail', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'image/jpeg' },
                        body: blob
                    });
                } catch (e) {
                    // Thumbnail upload failure should not affect streaming
                }
            }, 30000);
        }

        function stopThumbnailCapture() {
            if (thumbnailInterval) {
                clearInterval(thumbnailInterval);
                thumbnailInterval = null;
            }
        }

        function stopStreaming() {
            stopThumbnailCapture();
            if (pc) { pc.close(); pc = null; }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            document.getElementById('preview').srcObject = null;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            log('Streaming stopped.');
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function thumbnailHtml(url) {
            if (url) {
                return '<img class="card-thumb" src="' + escapeHtml(url) + '" alt="thumbnail" />';
            }
            return '<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>';
        }

        function renderMyStreams(streams) {
            var grid = document.getElementById('my-streams-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<div class="streams-empty">No streams yet</div>';
                return;
            }
            grid.innerHTML = streams.map(function(s) {
                var title = s.title || 'Untitled';
                var statusClass = 'status-' + s.status.toLowerCase();
                var statusLabel = s.status.charAt(0).toUpperCase() + s.status.slice(1);
                var thumbBtn = '';
                if (s.vod_status === 'ready') {
                    thumbBtn = '<label class="thumb-upload-btn" style="display:inline-block;margin-top:6px;padding:4px 8px;background:#0f3460;color:#fff;border-radius:4px;font-size:11px;cursor:pointer;">' +
                        'Change Thumbnail' +
                        '<input type="file" accept="image/jpeg" style="display:none" onchange="uploadCustomThumb(\'' + s.id + '\', this)" />' +
                        '</label>';
                }
                return '<div class="stream-card" id="stream-card-' + s.id + '">' +
                    '<img class="card-thumb" id="thumb-' + s.id + '" src="' + escapeHtml(s.thumbnail_url || '') + '" alt="thumbnail" style="' + (s.thumbnail_url ? '' : 'display:none') + '" />' +
                    (s.thumbnail_url ? '' : '<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>') +
                    '<div class="card-title">' + escapeHtml(title) + '</div>' +
                    '<span class="card-status ' + statusClass + '">' + statusLabel + '</span>' +
                    thumbBtn +
                    '</div>';
            }).join('');
        }

        async function uploadCustomThumb(streamId, input) {
            var file = input.files && input.files[0];
            if (!file) return;
            try {
                var res = await fetch(apiUrl() + '/v1/streams/' + streamId + '/thumbnail', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'image/jpeg' },
                    body: file
                });
                if (!res.ok) {
                    log('Thumbnail upload failed: ' + res.status);
                    return;
                }
                var json = await res.json();
                var thumbImg = document.getElementById('thumb-' + streamId);
                if (thumbImg) {
                    thumbImg.src = json.data.thumbnail_url + '?t=' + Date.now();
                    thumbImg.style.display = '';
                }
                log('Custom thumbnail uploaded for stream ' + streamId.substring(0, 8));
            } catch (e) {
                log('Thumbnail upload error: ' + e.message);
            }
            input.value = '';
        }

        async function fetchMyStreams() {
            if (!accessToken) return;
            try {
                var res = await fetch(apiUrl() + '/v1/streams', { headers: authHeaders() });
                if (!res.ok) return;
                var json = await res.json();
                renderMyStreams(json.data);
                document.getElementById('my-streams-section').classList.remove('disabled');
            } catch (e) {
                // silently ignore
            }
        }
    </script>
</body>
</html>
