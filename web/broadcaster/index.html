<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Broadcaster</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { margin-bottom: 20px; color: #e94560; }
        .container { max-width: 900px; margin: 0 auto; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #eee; font-size: 14px; }
        input#api-url { width: 300px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button.primary { background: #e94560; color: #fff; }
        button.primary:hover { background: #c73e54; }
        button.secondary { background: #0f3460; color: #fff; }
        button.secondary:hover { background: #1a4a7a; }
        button.danger { background: #666; color: #fff; }
        button.danger:hover { background: #888; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        video { width: 100%; max-width: 800px; background: #000; border-radius: 8px; margin-bottom: 10px; }
        .status { padding: 10px; background: #16213e; border-radius: 4px; margin-top: 10px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        label { font-size: 14px; color: #aaa; min-width: 70px; }
        .section { border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .section h2 { font-size: 16px; margin-bottom: 10px; color: #aaa; }
        .section.disabled { opacity: 0.4; pointer-events: none; }
        .user-info { font-size: 13px; color: #4ecca3; margin-bottom: 10px; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { padding: 6px 14px; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 13px; background: #16213e; color: #aaa; }
        .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
        .streams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .streams-empty { color: #666; font-size: 14px; padding: 16px 0; }
        .stream-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 12px; }
        .stream-card .card-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; object-fit: cover; background: #222; }
        .stream-card .card-thumb-placeholder { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; background: #222; display: flex; align-items: center; justify-content: center; }
        .stream-card .card-thumb-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }
        .stream-card .card-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stream-card .card-status { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .status-pending { background: #555; color: #ccc; }
        .status-live { background: #e94560; color: #fff; }
        .status-ended { background: #4ecdc4; color: #1a1a2e; }
        /* Chat panel */
        .chat-messages { height: 240px; overflow-y: auto; background: #0f1830; border: 1px solid #222; border-radius: 4px; padding: 8px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
        .chat-msg { line-height: 1.4; word-break: break-word; position: relative; padding-right: 24px; }
        .chat-msg .cm-name { color: #4ecdc4; font-weight: bold; margin-right: 6px; }
        .chat-msg .cm-body { color: #eee; }
        .chat-msg .cm-actions { display: none; position: absolute; right: 0; top: 0; gap: 4px; }
        .chat-msg:hover .cm-actions { display: flex; }
        .cm-actions button { background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 4px; color: #e94560; }
        .cm-actions button:hover { text-decoration: underline; }
        .ban-menu { position: absolute; right: 0; top: 16px; background: #1a2a4e; border: 1px solid #444; border-radius: 4px; padding: 4px; z-index: 10; display: flex; flex-direction: column; gap: 2px; }
        .ban-menu button { font-size: 11px; background: #e94560; color: #fff; border: none; border-radius: 3px; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
        .ban-menu button:hover { background: #c73e54; }
        .chat-compose { display: flex; gap: 6px; margin-top: 8px; }
        .chat-compose input { flex: 1; }
        .chat-compose button { padding: 6px 12px; }
        .chat-status { font-size: 12px; color: #aaa; margin-top: 4px; min-height: 16px; }
        .chat-status.err { color: #e94560; }
        .chat-empty { color: #666; text-align: center; padding: 20px 0; }
        .chat-toast { position: fixed; top: 20px; right: 20px; background: #e94560; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; z-index: 100; display: none; }
        .bans-section { margin-top: 8px; }
        .bans-toggle { background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .bans-toggle:hover { border-color: #e94560; color: #eee; }
        .bans-list { margin-top: 6px; font-size: 12px; }
        .ban-entry { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #222; }
        .ban-entry .ban-info { color: #ccc; }
        .ban-entry .ban-ttl { color: #aaa; margin-left: 8px; }
        .ban-entry button { font-size: 11px; background: #0f3460; color: #fff; border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer; }
        .ban-entry button:hover { background: #1a4a7a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>StreamHub Broadcaster</h1>

        <div class="controls">
            <label>API URL:</label>
            <input type="text" id="api-url" value="" />
        </div>

        <!-- Auth Section -->
        <div class="section" id="auth-section">
            <h2>1. Login / Register</h2>
            <div id="auth-form">
                <div class="tab-bar">
                    <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                    <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
                </div>
                <div class="controls">
                    <label>Email:</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" />
                </div>
                <div class="controls">
                    <label>Password:</label>
                    <input type="password" id="auth-password" placeholder="min 8 chars" />
                </div>
                <div class="controls">
                    <button class="primary" id="btn-auth" onclick="doAuth()">Login</button>
                </div>
            </div>
            <div id="user-info" style="display:none;">
                <div class="user-info" id="user-display"></div>
                <button class="danger" onclick="doLogout()">Logout</button>
            </div>
        </div>

        <!-- Stream Section -->
        <div class="section disabled" id="stream-section">
            <h2>2. Create Stream</h2>
            <div class="controls">
                <label>Title:</label>
                <input type="text" id="stream-title" placeholder="My Stream" />
                <button class="primary" id="btn-create" onclick="createStream()">Create Stream</button>
            </div>
            <div class="controls" id="stream-info" style="display:none;">
                <label>Key:</label>
                <input type="text" id="stream-key" readonly style="width:320px" />
            </div>
        </div>

        <!-- Streaming Section -->
        <div class="section disabled" id="streaming-section">
            <h2>3. Go Live</h2>
            <div class="controls">
                <button class="primary" id="btn-start" onclick="startStreaming()">Start Streaming</button>
                <button class="danger" id="btn-stop" onclick="stopStreaming()" disabled>Stop</button>
                <span id="viewer-count" style="display:none; font-size:13px; color:#4ecca3; margin-left:10px;"></span>
            </div>
            <video id="preview" autoplay muted playsinline></video>
        </div>

        <!-- Chat Section -->
        <div class="section disabled" id="chat-section">
            <h2>Chat</h2>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-empty">Create and start a stream to chat.</div>
            </div>
            <div class="chat-compose">
                <input type="text" id="chat-input" maxlength="500" placeholder="Type a message (max 500)" disabled onkeydown="if(event.key==='Enter'){sendChat();}" />
                <button class="primary" id="chat-send-btn" onclick="sendChat()" disabled>Send</button>
            </div>
            <div class="chat-status" id="chat-status"></div>
            <div class="bans-section" id="bans-section" style="display:none;">
                <button class="bans-toggle" onclick="toggleBansList()">Banned Users</button>
                <div class="bans-list" id="bans-list" style="display:none;"></div>
            </div>
        </div>
        <div class="chat-toast" id="chat-toast"></div>

        <!-- My Streams Section -->
        <div class="section disabled" id="my-streams-section">
            <h2>My Streams</h2>
            <div id="my-streams-grid" class="streams-grid">
                <div class="streams-empty">Login to see your streams</div>
            </div>
        </div>

        <div class="status" id="log">Ready. Please login or register first.</div>
    </div>

    <script>
        let accessToken = null;
        let refreshToken = null;
        let currentUser = null;
        let currentStreamId = null;
        let currentStreamKey = null;
        let pc = null;
        let localStream = null;
        let authMode = 'login';
        let thumbnailInterval = null;
        let ws = null;
        let wsReconnectTimer = null;
        let isStreaming = false;
        let streamReconnectTimer = null;
        let streamForceEnded = false;

        // Detect environment: if served via nginx (port 3000), use proxy paths
        // Otherwise (direct file open or other port), use direct localhost URLs
        function detectUrls() {
            const loc = window.location;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                document.getElementById('api-url').value = loc.origin;
            } else {
                document.getElementById('api-url').value = 'http://localhost:8080';
            }
        }
        detectUrls();

        function log(msg) {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleTimeString();
            el.textContent += '\n[' + ts + '] ' + msg;
            el.scrollTop = el.scrollHeight;
        }

        function apiUrl() { return document.getElementById('api-url').value; }

        function authHeaders() {
            const h = { 'Content-Type': 'application/json' };
            if (accessToken) h['Authorization'] = 'Bearer ' + accessToken;
            return h;
        }

        function switchTab(mode) {
            authMode = mode;
            document.getElementById('tab-login').className = mode === 'login' ? 'tab active' : 'tab';
            document.getElementById('tab-register').className = mode === 'register' ? 'tab active' : 'tab';
            document.getElementById('btn-auth').textContent = mode === 'login' ? 'Login' : 'Register';
        }

        async function doAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) { log('Please enter email and password.'); return; }

            const endpoint = authMode === 'login' ? '/v1/auth/login' : '/v1/auth/register';
            const body = authMode === 'login'
                ? { email, password }
                : { email, password, role: 'broadcaster' };

            try {
                const res = await fetch(apiUrl() + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const json = await res.json();

                if (!res.ok) {
                    log(authMode + ' failed: ' + (json.error?.message || res.status));
                    return;
                }

                accessToken = json.data.access_token;
                refreshToken = json.data.refresh_token;
                currentUser = json.data.user;

                document.getElementById('auth-form').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('user-display').textContent =
                    'Logged in as: ' + currentUser.email + ' (' + currentUser.role + ')';

                document.getElementById('stream-section').classList.remove('disabled');
                log('Logged in as ' + currentUser.email);
                // Reconnect WS so server sees the access token for chat auth.
                reconnectWsForAuth();
                fetchMyStreams();
            } catch (e) {
                log('Auth error: ' + e.message);
            }
        }

        function doLogout() {
            if (currentChatRoomId) chatUnsubscribeRoom(currentChatRoomId);
            document.getElementById('chat-section').classList.add('disabled');
            document.getElementById('chat-input').disabled = true;
            document.getElementById('chat-send-btn').disabled = true;
            accessToken = null;
            refreshToken = null;
            currentUser = null;
            currentStreamId = null;
            currentStreamKey = null;
            reconnectWsForAuth();

            document.getElementById('auth-form').style.display = 'block';
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('stream-section').classList.add('disabled');
            document.getElementById('streaming-section').classList.add('disabled');
            document.getElementById('stream-info').style.display = 'none';
            document.getElementById('btn-create').disabled = false;

            stopStreaming();
            log('Logged out.');
        }

        async function createStream() {
            const title = document.getElementById('stream-title').value || null;

            try {
                const res = await fetch(apiUrl() + '/v1/streams', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ title })
                });
                const json = await res.json();

                if (!res.ok) {
                    log('Create stream failed: ' + (json.error?.message || res.status));
                    return;
                }

                const stream = json.data;
                currentStreamId = stream.id;
                currentStreamKey = stream.stream_key;
                streamForceEnded = false;
                document.getElementById('stream-key').value = currentStreamKey;
                document.getElementById('stream-info').style.display = 'flex';
                document.getElementById('btn-create').disabled = true;

                document.getElementById('streaming-section').classList.remove('disabled');

                log('Stream created: ' + currentStreamKey);
                chatSubscribeRoom(currentStreamId);
                fetchMyStreams();

                // Start camera preview
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('preview').srcObject = localStream;
                log('Camera ready.');
            } catch (e) {
                log('Error: ' + e.message);
            }
        }

        async function startStreaming() {
            if (!currentStreamId || !localStream || streamForceEnded) return;

            try {
                // Get push token from API
                log('Requesting push token...');
                const tokenRes = await fetch(apiUrl() + '/v1/streams/' + currentStreamId + '/token', {
                    method: 'POST',
                    headers: authHeaders()
                });
                const tokenJson = await tokenRes.json();

                if (!tokenRes.ok) {
                    const reason = tokenJson.error?.message || tokenRes.status;
                    log('Token error: ' + reason);
                    if (tokenRes.status === 409 && reason === 'STREAM_FORCE_ENDED') {
                        handleStreamForceEnded(currentStreamId, reason);
                    }
                    return;
                }

                const whipUrl = tokenJson.data.whip_url;

                log('Got push token, connecting WHIP...');

                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') { resolve(); return; }
                    pc.addEventListener('icegatheringstatechange', () => {
                        if (pc.iceGatheringState === 'complete') resolve();
                    });
                });

                const res = await fetch(whipUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });

                if (!res.ok) {
                    log('WHIP error: ' + res.status + ' ' + await res.text());
                    return;
                }

                const answerSdp = await res.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

                pc.onconnectionstatechange = function() {
                    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                        scheduleStreamReconnect('WebRTC disconnected');
                    }
                };

                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-stop').disabled = false;
                isStreaming = true;
                log('Streaming live!');

                // Subscribe to viewer count via WS
                if (ws && ws.readyState === WebSocket.OPEN && currentStreamId) {
                    ws.send(JSON.stringify({ action: 'subscribe', stream_id: currentStreamId }));
                }

                // Start periodic canvas thumbnail capture (every 30s)
                startThumbnailCapture();
            } catch (e) {
                log('Streaming error: ' + e.message);
            }
        }

        function startThumbnailCapture() {
            if (thumbnailInterval) clearInterval(thumbnailInterval);
            thumbnailInterval = setInterval(async function() {
                try {
                    var video = document.getElementById('preview');
                    if (!video.videoWidth || !video.videoHeight) return;
                    var canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    var blob = await new Promise(function(resolve) {
                        canvas.toBlob(resolve, 'image/jpeg', 0.7);
                    });
                    if (!blob || !currentStreamId) return;
                    await fetch(apiUrl() + '/v1/streams/' + currentStreamId + '/thumbnail', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'image/jpeg' },
                        body: blob
                    });
                } catch (e) {
                    // Thumbnail upload failure should not affect streaming
                }
            }, 30000);
        }

        function stopThumbnailCapture() {
            if (thumbnailInterval) {
                clearInterval(thumbnailInterval);
                thumbnailInterval = null;
            }
        }

        function clearStreamReconnectTimer() {
            if (streamReconnectTimer) {
                clearTimeout(streamReconnectTimer);
                streamReconnectTimer = null;
            }
        }

        function scheduleStreamReconnect(reason) {
            if (!currentStreamId || !isStreaming || streamForceEnded) return;
            clearStreamReconnectTimer();
            log(reason + ', reconnecting in 3s...');
            streamReconnectTimer = setTimeout(async function() {
                streamReconnectTimer = null;
                if (isStreaming && currentStreamId && !streamForceEnded) {
                    await startStreaming();
                }
            }, 3000);
        }

        function handleStreamForceEnded(streamId, reason) {
            if (streamId !== currentStreamId) return;
            streamForceEnded = true;
            clearStreamReconnectTimer();
            log('Stream was force-ended by admin. Stopping reconnect.');
            isStreaming = false;
            if (pc) {
                pc.onconnectionstatechange = null;
            }
            stopStreaming();
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = true;
            alert('This stream was ended by an admin. Please create a new stream to go live again.');
        }

        function stopStreaming() {
            clearStreamReconnectTimer();
            stopThumbnailCapture();
            isStreaming = false;
            // Unsubscribe from viewer count
            if (ws && ws.readyState === WebSocket.OPEN && currentStreamId) {
                ws.send(JSON.stringify({ action: 'unsubscribe', stream_id: currentStreamId }));
            }
            updateViewerCountDisplay(0);
            if (pc) { pc.close(); pc = null; }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            document.getElementById('preview').srcObject = null;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            log('Streaming stopped.');
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function thumbnailHtml(url) {
            if (url) {
                return '<img class="card-thumb" src="' + escapeHtml(url) + '" alt="thumbnail" />';
            }
            return '<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>';
        }

        function renderMyStreams(streams) {
            var grid = document.getElementById('my-streams-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<div class="streams-empty">No streams yet</div>';
                return;
            }
            grid.innerHTML = streams.map(function(s) {
                var title = s.title || 'Untitled';
                var statusClass = 'status-' + s.status.toLowerCase();
                var statusLabel = s.status.charAt(0).toUpperCase() + s.status.slice(1);
                var thumbBtn = '';
                if (s.vod_status === 'ready') {
                    thumbBtn = '<label class="thumb-upload-btn" style="display:inline-block;margin-top:6px;padding:4px 8px;background:#0f3460;color:#fff;border-radius:4px;font-size:11px;cursor:pointer;">' +
                        'Change Thumbnail' +
                        '<input type="file" accept="image/jpeg" style="display:none" onchange="uploadCustomThumb(\'' + s.id + '\', this)" />' +
                        '</label>';
                }
                return '<div class="stream-card" id="stream-card-' + s.id + '">' +
                    '<img class="card-thumb" id="thumb-' + s.id + '" src="' + escapeHtml(s.thumbnail_url || '') + '" alt="thumbnail" style="' + (s.thumbnail_url ? '' : 'display:none') + '" />' +
                    (s.thumbnail_url ? '' : '<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>') +
                    '<div class="card-title">' + escapeHtml(title) + '</div>' +
                    '<span class="card-status ' + statusClass + '">' + statusLabel + '</span>' +
                    thumbBtn +
                    '</div>';
            }).join('');
        }

        async function uploadCustomThumb(streamId, input) {
            var file = input.files && input.files[0];
            if (!file) return;
            try {
                var res = await fetch(apiUrl() + '/v1/streams/' + streamId + '/thumbnail', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'image/jpeg' },
                    body: file
                });
                if (!res.ok) {
                    log('Thumbnail upload failed: ' + res.status);
                    return;
                }
                var json = await res.json();
                var thumbImg = document.getElementById('thumb-' + streamId);
                if (thumbImg) {
                    thumbImg.src = json.data.thumbnail_url + '?t=' + Date.now();
                    thumbImg.style.display = '';
                }
                log('Custom thumbnail uploaded for stream ' + streamId.substring(0, 8));
            } catch (e) {
                log('Thumbnail upload error: ' + e.message);
            }
            input.value = '';
        }

        async function fetchMyStreams() {
            if (!accessToken) return;
            try {
                var res = await fetch(apiUrl() + '/v1/streams', { headers: authHeaders() });
                if (!res.ok) return;
                var json = await res.json();
                renderMyStreams(json.data);
                document.getElementById('my-streams-section').classList.remove('disabled');
            } catch (e) {
                // silently ignore
            }
        }

        // --- WebSocket for viewer count + reconnect + chat ---
        let currentChatRoomId = null;

        function wsUrl() {
            var loc = window.location;
            var base;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                var proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
                base = proto + '//' + loc.host + '/ws';
            } else {
                base = 'ws://localhost:3000/ws';
            }
            if (accessToken) {
                base += (base.indexOf('?') >= 0 ? '&' : '?') + 'token=' + encodeURIComponent(accessToken);
            }
            return base;
        }

        function reconnectWsForAuth() {
            if (ws) {
                try { ws.close(); } catch (_) {}
                ws = null;
            }
            if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
            connectWs();
        }

        function connectWs() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                return;
            }
            ws = new WebSocket(wsUrl());
            ws.onopen = function() {
                log('WebSocket connected');
                // Subscribe to current stream if streaming
                if (currentStreamId) {
                    ws.send(JSON.stringify({ action: 'subscribe', stream_id: currentStreamId }));
                }
                if (currentChatRoomId) {
                    ws.send(JSON.stringify({ action: 'subscribe_chat', stream_id: currentChatRoomId }));
                }
            };
            ws.onmessage = function(e) {
                try {
                    var msg = JSON.parse(e.data);
                    switch (msg.type) {
                        case 'viewer_count':
                            if (msg.stream_id === currentStreamId) {
                                updateViewerCountDisplay(msg.count);
                            }
                            break;
                        case 'reconnect':
                            handleReconnect(msg);
                            break;
                        case 'chat_history':
                            chatRenderHistory(msg.messages || []);
                            break;
                        case 'chat_message':
                            chatAppendMessage(msg.message);
                            break;
                        case 'chat_message_deleted':
                            chatRemoveMessage(msg.msg_id);
                            break;
                        case 'chat_error':
                            chatHandleError(msg.reason);
                            break;
                        case 'session_terminated':
                            handleSessionTerminated(msg.reason);
                            break;
                        case 'stream_force_ended':
                            handleStreamForceEnded(msg.stream_id, msg.reason);
                            break;
                    }
                } catch (err) {
                    // ignore parse errors
                }
            };
            ws.onclose = function() {
                wsReconnectTimer = setTimeout(connectWs, 3000);
            };
            ws.onerror = function() {
                // onclose will fire after onerror
            };
        }

        function handleSessionTerminated(reason) {
            if (ws) { ws.onclose = null; ws.close(); ws = null; }
            clearTimeout(wsReconnectTimer);
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            accessToken = null;
            alert('Your account has been suspended. Please contact support.');
            window.location.reload();
        }

        function updateViewerCountDisplay(count) {
            var el = document.getElementById('viewer-count');
            if (el) {
                el.textContent = count + ' watching';
                el.style.display = count > 0 ? 'inline-block' : 'none';
            }
        }

        function handleReconnect(msg) {
            if (!currentStreamId || !isStreaming || streamForceEnded) return;
            if (msg.stream_ids && msg.stream_ids.includes(currentStreamId)) {
                scheduleStreamReconnect('Received reconnect event');
            }
        }

        // --- Chat ---
        function chatSetStatus(msg, isError) {
            var el = document.getElementById('chat-status');
            el.textContent = msg || '';
            el.className = isError ? 'chat-status err' : 'chat-status';
        }

        function chatSubscribeRoom(streamId) {
            if (currentChatRoomId && currentChatRoomId !== streamId) {
                chatUnsubscribeRoom(currentChatRoomId);
            }
            currentChatRoomId = streamId;
            document.getElementById('chat-section').classList.remove('disabled');
            document.getElementById('chat-messages').innerHTML = '<div class="chat-empty">Loading history...</div>';
            document.getElementById('chat-input').disabled = !accessToken;
            document.getElementById('chat-send-btn').disabled = !accessToken;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'subscribe_chat', stream_id: streamId }));
            }
            if (canModerate()) {
                document.getElementById('bans-section').style.display = '';
                fetchBansList();
            }
        }

        function chatUnsubscribeRoom(streamId) {
            if (!streamId) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'unsubscribe_chat', stream_id: streamId }));
            }
            if (currentChatRoomId === streamId) currentChatRoomId = null;
        }

        function chatRenderHistory(messages) {
            var box = document.getElementById('chat-messages');
            box.innerHTML = '';
            if (!messages.length) {
                box.innerHTML = '<div class="chat-empty">No messages yet.</div>';
                return;
            }
            messages.forEach(function(m) { chatAppendMessage(m, true); });
            box.scrollTop = box.scrollHeight;
        }

        function chatAppendMessage(m, suppressScroll) {
            if (!m) return;
            if (currentChatRoomId && m.stream_id && m.stream_id !== currentChatRoomId) return;
            var box = document.getElementById('chat-messages');
            var empty = box.querySelector('.chat-empty');
            if (empty) empty.remove();
            var row = document.createElement('div');
            row.className = 'chat-msg';
            if (m.id) row.setAttribute('data-msg-id', m.id);
            if (m.user_id) row.setAttribute('data-user-id', m.user_id);
            var nameSpan = document.createElement('span');
            nameSpan.className = 'cm-name';
            nameSpan.textContent = (m.display_name || 'anon') + ':';
            var bodySpan = document.createElement('span');
            bodySpan.className = 'cm-body';
            bodySpan.textContent = m.content || '';
            row.appendChild(nameSpan);
            row.appendChild(bodySpan);
            if (canModerate() && m.id) {
                var actions = document.createElement('span');
                actions.className = 'cm-actions';
                var delBtn = document.createElement('button');
                delBtn.textContent = 'X';
                delBtn.title = 'Delete message';
                delBtn.onclick = function() { chatDeleteMessage(m.id); };
                actions.appendChild(delBtn);
                if (m.user_id && currentUser && m.user_id !== currentUser.id) {
                    var banBtn = document.createElement('button');
                    banBtn.textContent = 'Ban';
                    banBtn.onclick = function(e) { showBanMenu(e, m.user_id, m.display_name); };
                    actions.appendChild(banBtn);
                }
                row.appendChild(actions);
            }
            box.appendChild(row);
            if (!suppressScroll) box.scrollTop = box.scrollHeight;
        }

        function chatHandleError(reason) {
            var msg;
            switch (reason) {
                case 'RATE_LIMITED': msg = 'Slow down — 1 message per second.'; break;
                case 'TOO_LONG': msg = 'Message too long or empty.'; break;
                case 'UNAUTHORIZED': msg = 'Please log in to send messages.'; break;
                case 'UNKNOWN_STREAM': msg = 'Stream is not live.'; break;
                case 'BANNED': msg = 'You are banned from this chat.'; showToast(msg); break;
                default: msg = 'Chat error: ' + reason;
            }
            chatSetStatus(msg, true);
            setTimeout(function() {
                var el = document.getElementById('chat-status');
                if (el.textContent === msg) chatSetStatus('');
            }, 3000);
        }

        function canModerate() {
            if (!currentUser) return false;
            if (currentUser.role === 'admin') return true;
            if (currentStreamId && currentChatRoomId === currentStreamId) return true;
            return false;
        }

        function showToast(msg) {
            var el = document.getElementById('chat-toast');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 4000);
        }

        function chatRemoveMessage(msgId) {
            var el = document.querySelector('.chat-msg[data-msg-id="' + msgId + '"]');
            if (el) el.remove();
        }

        function chatDeleteMessage(msgId) {
            if (!currentChatRoomId) return;
            fetch(apiUrl() + '/v1/streams/' + currentChatRoomId + '/chat/messages/' + msgId, {
                method: 'DELETE', headers: authHeaders()
            }).then(function(res) {
                if (!res.ok) chatSetStatus('Delete failed: ' + res.status, true);
            });
        }

        var activeBanMenu = null;
        function showBanMenu(e, userId, displayName) {
            closeBanMenu();
            var menu = document.createElement('div');
            menu.className = 'ban-menu';
            var opts = [{label:'10 min', secs:600},{label:'1 hour', secs:3600},{label:'1 day', secs:86400},{label:'Permanent', secs:null}];
            opts.forEach(function(opt) {
                var btn = document.createElement('button');
                btn.textContent = opt.label;
                btn.onclick = function() { doBan(userId, opt.secs); closeBanMenu(); };
                menu.appendChild(btn);
            });
            e.target.closest('.chat-msg').appendChild(menu);
            activeBanMenu = menu;
            setTimeout(function() {
                document.addEventListener('click', closeBanMenuOnOutside, {once:true});
            }, 0);
        }
        function closeBanMenu() { if (activeBanMenu) { activeBanMenu.remove(); activeBanMenu = null; } }
        function closeBanMenuOnOutside(e) { if (activeBanMenu && !activeBanMenu.contains(e.target)) closeBanMenu(); }

        function doBan(userId, durationSecs) {
            if (!currentChatRoomId) return;
            fetch(apiUrl() + '/v1/streams/' + currentChatRoomId + '/chat/bans', {
                method: 'POST', headers: authHeaders(),
                body: JSON.stringify({ user_id: userId, duration_secs: durationSecs })
            }).then(function(res) {
                if (res.ok) { chatSetStatus('User banned.'); fetchBansList(); }
                else res.json().then(function(j) { chatSetStatus('Ban failed: ' + (j.error && j.error.message || res.status), true); });
            });
        }

        var bansCountdownInterval = null;
        function toggleBansList() {
            var el = document.getElementById('bans-list');
            if (el.style.display === 'none') { el.style.display = ''; fetchBansList(); }
            else el.style.display = 'none';
        }

        function fetchBansList() {
            if (!currentChatRoomId) return;
            fetch(apiUrl() + '/v1/streams/' + currentChatRoomId + '/chat/bans', { headers: authHeaders() })
            .then(function(res) { return res.json(); })
            .then(function(json) { renderBansList(json.data || []); });
        }

        function renderBansList(bans) {
            var el = document.getElementById('bans-list');
            if (bansCountdownInterval) { clearInterval(bansCountdownInterval); bansCountdownInterval = null; }
            if (!bans.length) { el.innerHTML = '<div style="color:#666;padding:4px 0;">No bans</div>'; return; }
            el.innerHTML = '';
            bans.forEach(function(b) {
                var row = document.createElement('div');
                row.className = 'ban-entry';
                row.setAttribute('data-ban-user', b.user_id);
                var info = document.createElement('span');
                info.className = 'ban-info';
                info.textContent = b.display_name || b.user_id.slice(0,8);
                var ttl = document.createElement('span');
                ttl.className = 'ban-ttl';
                if (b.expires_at) {
                    var remaining = Math.max(0, Math.floor((new Date(b.expires_at).getTime() - Date.now()) / 1000));
                    ttl.setAttribute('data-remaining', remaining);
                    ttl.textContent = formatCountdown(remaining);
                } else {
                    ttl.textContent = 'Permanent';
                }
                var btn = document.createElement('button');
                btn.textContent = 'Unban';
                btn.onclick = function() { doUnban(b.user_id); };
                row.appendChild(info);
                row.appendChild(ttl);
                row.appendChild(btn);
                el.appendChild(row);
            });
            bansCountdownInterval = setInterval(updateBansCountdown, 1000);
        }

        function formatCountdown(secs) {
            if (secs <= 0) return 'Expired';
            var h = Math.floor(secs / 3600);
            var m = Math.floor((secs % 3600) / 60);
            var s = secs % 60;
            if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            return m + ':' + String(s).padStart(2,'0');
        }

        function updateBansCountdown() {
            document.querySelectorAll('.ban-ttl[data-remaining]').forEach(function(el) {
                var r = parseInt(el.getAttribute('data-remaining'), 10) - 1;
                if (r <= 0) { el.closest('.ban-entry').remove(); return; }
                el.setAttribute('data-remaining', r);
                el.textContent = formatCountdown(r);
            });
        }

        function doUnban(userId) {
            if (!currentChatRoomId) return;
            fetch(apiUrl() + '/v1/streams/' + currentChatRoomId + '/chat/bans/' + userId, {
                method: 'DELETE', headers: authHeaders()
            }).then(function(res) {
                if (res.ok) {
                    var row = document.querySelector('.ban-entry[data-ban-user="' + userId + '"]');
                    if (row) row.remove();
                    chatSetStatus('User unbanned.');
                } else chatSetStatus('Unban failed: ' + res.status, true);
            });
        }

        function sendChat() {
            var input = document.getElementById('chat-input');
            var content = input.value;
            if (!content.trim()) return;
            if (!currentChatRoomId) { chatSetStatus('Create a stream first.', true); return; }
            if (!accessToken) { chatSetStatus('Please log in.', true); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { chatSetStatus('Disconnected.', true); return; }
            ws.send(JSON.stringify({ action: 'send_chat', stream_id: currentChatRoomId, content: content }));
            input.value = '';
        }

        // Connect WebSocket on page load
        connectWs();
    </script>
</body>
</html>
