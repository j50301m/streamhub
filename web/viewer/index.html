<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { margin-bottom: 20px; color: #0f3460; }
        .container { max-width: 900px; margin: 0 auto; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #eee; font-size: 14px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button.primary { background: #0f3460; color: #fff; }
        button.primary:hover { background: #1a4a7a; }
        button.secondary { background: #e94560; color: #fff; }
        button.secondary:hover { background: #c73e54; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        video { width: 100%; max-width: 800px; background: #000; border-radius: 8px; margin-bottom: 10px; }
        .status { padding: 10px; background: #16213e; border-radius: 4px; margin-top: 10px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        label { font-size: 14px; color: #aaa; }
        .mode-info { font-size: 12px; color: #888; margin-top: 5px; }
        .section { margin-bottom: 20px; }
        .section h2 { font-size: 18px; margin-bottom: 10px; }
        .section h2.live-title { color: #e94560; }
        .section h2.vod-title { color: #4ecdc4; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .live-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
        .live-card:hover { border-color: #e94560; background: #1a2a4e; }
        .live-card .card-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live-card .card-key { font-size: 12px; color: #888; font-family: monospace; }
        .live-card .card-time { font-size: 12px; color: #aaa; margin-top: 6px; }
        .live-card .card-badge { display: inline-block; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; }
        .badge-live { background: #e94560; color: #fff; }
        .badge-vod { background: #4ecdc4; color: #1a1a2e; }
        .vod-card:hover { border-color: #4ecdc4; background: #1a2a4e; }
        .live-empty { color: #666; font-size: 14px; padding: 16px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <h1>StreamHub Viewer</h1>

        <div class="section">
            <h2 class="live-title">Live Now</h2>
            <div id="live-grid" class="live-grid">
                <div class="live-empty">Loading...</div>
            </div>
        </div>

        <div class="section">
            <h2 class="vod-title">VOD Replays</h2>
            <div id="vod-grid" class="live-grid">
                <div class="live-empty">Loading...</div>
            </div>
        </div>

        <div class="controls">
            <label>API URL:</label>
            <input type="text" id="api-url" value="" />
        </div>

        <div class="controls">
            <label>Stream Key:</label>
            <input type="text" id="stream-key" placeholder="paste stream key here" />
            <button class="primary" id="btn-whep" onclick="watchWHEP()">Watch (WHEP)</button>
            <button class="secondary" id="btn-hls" onclick="watchHLS()">Watch (HLS)</button>
            <button class="primary" id="btn-stop" onclick="stopWatching()" disabled>Stop</button>
        </div>

        <video id="player" autoplay playsinline controls></video>
        <div class="mode-info" id="mode-info"></div>

        <div class="status" id="log">Ready. Enter a stream key and choose WHEP (low latency) or HLS (compatibility).</div>
    </div>

    <script>
        let pc = null;
        let hls = null;
        let mediamtxBase = '';
        let hlsBase = '';
        let vodBase = '';
        let refreshInterval = null;

        // Detect environment: if served via nginx (port 3000), use proxy paths
        // Otherwise (direct file open or other port), use direct localhost URLs
        function detectUrls() {
            const loc = window.location;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                document.getElementById('api-url').value = loc.origin + '/api';
                mediamtxBase = loc.origin + '/mediamtx';
                hlsBase = loc.origin + '/hls';
                vodBase = loc.origin + '/vod';
            } else {
                document.getElementById('api-url').value = 'http://localhost:8080';
                mediamtxBase = 'http://localhost:8889';
                hlsBase = 'http://localhost:8888';
                vodBase = 'http://localhost:3000/vod';
            }
        }
        detectUrls();

        function timeAgo(dateStr) {
            const now = Date.now();
            const then = new Date(dateStr).getTime();
            const secs = Math.floor((now - then) / 1000);
            if (secs < 60) return secs + 's ago';
            const mins = Math.floor(secs / 60);
            if (mins < 60) return mins + ' min ago';
            const hrs = Math.floor(mins / 60);
            return hrs + 'h ago';
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function renderLiveStreams(streams) {
            const grid = document.getElementById('live-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<div class="live-empty">No live streams right now</div>';
                return;
            }
            grid.innerHTML = streams.map(function(s) {
                var title = s.title || 'Untitled';
                var shortKey = s.stream_key.substring(0, 8);
                var ago = s.started_at ? timeAgo(s.started_at) : '';
                return '<div class="live-card" onclick="selectStream(\'' + s.stream_key + '\')">' +
                    '<span class="card-badge badge-live">LIVE</span>' +
                    '<div class="card-title">' + escapeHtml(title) + '</div>' +
                    '<div class="card-key">' + shortKey + '</div>' +
                    '<div class="card-time">' + ago + '</div>' +
                    '</div>';
            }).join('');
        }

        function renderVodStreams(streams) {
            const grid = document.getElementById('vod-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<div class="live-empty">No VOD replays available</div>';
                return;
            }
            grid.innerHTML = streams.map(function(s) {
                var title = s.title || 'Untitled';
                var shortKey = s.stream_key.substring(0, 8);
                var ago = s.ended_at ? timeAgo(s.ended_at) : '';
                return '<div class="live-card vod-card" onclick="playVod(\'' + s.stream_key + '\', \'' + escapeHtml(s.hls_url || '') + '\')">' +
                    '<span class="card-badge badge-vod">VOD</span>' +
                    '<div class="card-title">' + escapeHtml(title) + '</div>' +
                    '<div class="card-key">' + shortKey + '</div>' +
                    '<div class="card-time">' + ago + '</div>' +
                    '</div>';
            }).join('');
        }

        function selectStream(streamKey) {
            document.getElementById('stream-key').value = streamKey;
            watchWHEP();
        }

        function playVod(streamKey, hlsUrl) {
            stopWatching();
            document.getElementById('stream-key').value = streamKey;

            // Build absolute VOD URL from hls_url (which is like /vod/{key}/hls/index.m3u8)
            var loc = window.location;
            var fullUrl;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                fullUrl = loc.origin + hlsUrl;
            } else {
                fullUrl = 'http://localhost:3000' + hlsUrl;
            }

            var video = document.getElementById('player');

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(fullUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    log('VOD playback started.');
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    log('HLS error: ' + data.type + ' - ' + data.details);
                });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: VOD (HLS replay)';
                log('Loading VOD: ' + fullUrl);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = fullUrl;
                video.addEventListener('loadedmetadata', function() { video.play(); });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: VOD (Native HLS)';
                log('Using native HLS for VOD: ' + fullUrl);
            } else {
                log('HLS not supported in this browser.');
            }
        }

        async function fetchLiveStreams() {
            var apiUrl = document.getElementById('api-url').value;
            try {
                var res = await fetch(apiUrl + '/v1/streams/live');
                if (!res.ok) return;
                var json = await res.json();
                renderLiveStreams(json.data);
            } catch (e) {
                // silently ignore refresh errors
            }
        }

        async function fetchVodStreams() {
            var apiUrl = document.getElementById('api-url').value;
            try {
                var res = await fetch(apiUrl + '/v1/streams/vod');
                if (!res.ok) return;
                var json = await res.json();
                renderVodStreams(json.data);
            } catch (e) {
                // silently ignore refresh errors
            }
        }

        // Initial fetch and auto-refresh every 10 seconds
        fetchLiveStreams();
        fetchVodStreams();
        refreshInterval = setInterval(function() {
            fetchLiveStreams();
            fetchVodStreams();
        }, 10000);

        function log(msg) {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleTimeString();
            el.textContent += '\n[' + ts + '] ' + msg;
            el.scrollTop = el.scrollHeight;
        }

        function stopWatching() {
            if (pc) { pc.close(); pc = null; }
            if (hls) { hls.destroy(); hls = null; }
            const video = document.getElementById('player');
            video.srcObject = null;
            video.src = '';
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('mode-info').textContent = '';
            log('Stopped watching.');
        }

        async function watchWHEP() {
            stopWatching();
            const streamKey = document.getElementById('stream-key').value.trim();
            if (!streamKey) { log('Please enter a stream key.'); return; }

            try {
                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                pc.addTransceiver('video', { direction: 'recvonly' });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                pc.ontrack = (event) => {
                    log('Received track: ' + event.track.kind);
                    document.getElementById('player').srcObject = event.streams[0];
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Wait for ICE gathering
                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') { resolve(); return; }
                    pc.addEventListener('icegatheringstatechange', () => {
                        if (pc.iceGatheringState === 'complete') resolve();
                    });
                });

                log('Sending WHEP offer...');
                const whepUrl = mediamtxBase + '/' + streamKey + '/whep';
                const res = await fetch(whepUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });

                if (!res.ok) {
                    log('WHEP error: ' + res.status + ' ' + await res.text());
                    return;
                }

                const answerSdp = await res.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: WHEP (WebRTC, low latency)';
                log('Connected via WHEP.');
            } catch (e) {
                log('WHEP error: ' + e.message);
            }
        }

        async function watchHLS() {
            stopWatching();
            const streamKey = document.getElementById('stream-key').value.trim();
            if (!streamKey) { log('Please enter a stream key.'); return; }

            const hlsUrl = hlsBase + '/' + streamKey + '/index.m3u8';
            const video = document.getElementById('player');

            if (Hls.isSupported()) {
                hls = new Hls({
                    lowLatencyMode: true,
                    liveSyncDurationCount: 3,
                });
                hls.loadSource(hlsUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    log('HLS playback started.');
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    log('HLS error: ' + data.type + ' - ' + data.details);
                });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: HLS (LL-HLS, compatible)';
                log('Connecting via HLS: ' + hlsUrl);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = hlsUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: Native HLS (Safari)';
                log('Using native HLS: ' + hlsUrl);
            } else {
                log('HLS not supported in this browser.');
            }
        }
    </script>
</body>
</html>
