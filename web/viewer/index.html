<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { margin-bottom: 20px; color: #0f3460; }
        .container { max-width: 900px; margin: 0 auto; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #eee; font-size: 14px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button.primary { background: #0f3460; color: #fff; }
        button.primary:hover { background: #1a4a7a; }
        button.secondary { background: #e94560; color: #fff; }
        button.secondary:hover { background: #c73e54; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        video { width: 100%; max-width: 800px; background: #000; border-radius: 8px; margin-bottom: 10px; }
        .status { padding: 10px; background: #16213e; border-radius: 4px; margin-top: 10px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        label { font-size: 14px; color: #aaa; }
        .mode-info { font-size: 12px; color: #888; margin-top: 5px; }
        .section { margin-bottom: 20px; }
        .section h2 { font-size: 18px; margin-bottom: 10px; }
        .section h2.live-title { color: #e94560; }
        .section h2.vod-title { color: #4ecdc4; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .live-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
        .live-card:hover { border-color: #e94560; background: #1a2a4e; }
        .live-card .card-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live-card .card-key { font-size: 12px; color: #888; font-family: monospace; }
        .live-card .card-time { font-size: 12px; color: #aaa; margin-top: 6px; }
        .live-card .card-badge { display: inline-block; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; }
        .badge-live { background: #e94560; color: #fff; }
        .badge-vod { background: #4ecdc4; color: #1a1a2e; }
        .vod-card:hover { border-color: #4ecdc4; background: #1a2a4e; }
        .live-empty { color: #666; font-size: 14px; padding: 16px 0; }
        .card-viewers { display: inline-block; font-size: 11px; color: #aaa; margin-left: 6px; }
        .card-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; object-fit: cover; background: #222; }
        .card-thumb-placeholder { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; background: #222; display: flex; align-items: center; justify-content: center; }
        .card-thumb-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }
        /* Chat panel */
        .chat-section { margin-top: 20px; background: #16213e; border-radius: 8px; padding: 12px; }
        .chat-section h2 { font-size: 16px; margin-bottom: 8px; color: #e94560; }
        .chat-auth { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; font-size: 13px; }
        .chat-auth input { padding: 6px 8px; font-size: 13px; }
        .chat-messages { height: 260px; overflow-y: auto; background: #0f1830; border: 1px solid #222; border-radius: 4px; padding: 8px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
        .chat-msg { line-height: 1.4; word-break: break-word; position: relative; padding-right: 24px; }
        .chat-msg .cm-name { color: #4ecdc4; font-weight: bold; margin-right: 6px; }
        .chat-msg .cm-body { color: #eee; }
        .chat-msg .cm-actions { display: none; position: absolute; right: 0; top: 0; gap: 4px; }
        .chat-msg:hover .cm-actions { display: flex; }
        .cm-actions button { background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 4px; color: #e94560; }
        .cm-actions button:hover { text-decoration: underline; }
        .ban-menu { position: absolute; right: 0; top: 16px; background: #1a2a4e; border: 1px solid #444; border-radius: 4px; padding: 4px; z-index: 10; display: flex; flex-direction: column; gap: 2px; }
        .ban-menu button { font-size: 11px; background: #e94560; color: #fff; border: none; border-radius: 3px; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
        .ban-menu button:hover { background: #c73e54; }
        .chat-compose { display: flex; gap: 6px; margin-top: 8px; }
        .chat-compose input { flex: 1; }
        .chat-compose button { padding: 6px 12px; }
        .chat-status { font-size: 12px; color: #aaa; margin-top: 4px; min-height: 16px; }
        .chat-status.err { color: #e94560; }
        .chat-empty { color: #666; text-align: center; padding: 20px 0; }
        .chat-toast { position: fixed; top: 20px; right: 20px; background: #e94560; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; z-index: 100; display: none; }
        .bans-section { margin-top: 8px; }
        .bans-toggle { background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .bans-toggle:hover { border-color: #e94560; color: #eee; }
        .bans-list { margin-top: 6px; font-size: 12px; }
        .ban-entry { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #222; }
        .ban-entry .ban-info { color: #ccc; }
        .ban-entry .ban-ttl { color: #aaa; margin-left: 8px; }
        .ban-entry button { font-size: 11px; background: #0f3460; color: #fff; border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer; }
        .ban-entry button:hover { background: #1a4a7a; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <h1>StreamHub Viewer</h1>

        <div class="section">
            <h2 class="live-title">Live Now</h2>
            <div id="live-grid" class="live-grid">
                <div class="live-empty">Loading...</div>
            </div>
        </div>

        <div class="section">
            <h2 class="vod-title">VOD Replays</h2>
            <div id="vod-grid" class="live-grid">
                <div class="live-empty">Loading...</div>
            </div>
        </div>

        <div class="controls">
            <label>API URL:</label>
            <input type="text" id="api-url" value="" />
        </div>

        <div class="controls">
            <label>Stream Key:</label>
            <input type="text" id="stream-key" placeholder="paste stream key here" />
            <button class="primary" id="btn-whep" onclick="watchWHEP()">Watch (WHEP)</button>
            <button class="secondary" id="btn-hls" onclick="watchHLS()">Watch (HLS)</button>
            <button class="primary" id="btn-stop" onclick="stopWatching()" disabled>Stop</button>
        </div>

        <video id="player" autoplay playsinline controls></video>
        <div class="mode-info" id="mode-info"></div>

        <div class="chat-section" id="chat-section" style="display:none;">
            <h2>Chat</h2>
            <div class="chat-auth" id="chat-auth">
                <input type="email" id="chat-email" placeholder="email" autocomplete="username" />
                <input type="password" id="chat-password" placeholder="password" autocomplete="current-password" />
                <button class="primary" onclick="chatLogin()">Login</button>
                <span id="chat-user-info" style="display:none; align-self:center;"></span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-empty">No messages yet.</div>
            </div>
            <div class="chat-compose">
                <input type="text" id="chat-input" maxlength="500" placeholder="Login to send a message" disabled onkeydown="if(event.key==='Enter'){sendChat();}" />
                <button class="primary" id="chat-send-btn" onclick="sendChat()" disabled>Send</button>
            </div>
            <div class="chat-status" id="chat-status"></div>
            <div class="bans-section" id="bans-section" style="display:none;">
                <button class="bans-toggle" onclick="toggleBansList()">Banned Users</button>
                <div class="bans-list" id="bans-list" style="display:none;"></div>
            </div>
        </div>
        <div class="chat-toast" id="chat-toast"></div>

        <div class="status" id="log">Ready. Enter a stream key and choose WHEP (low latency) or HLS (compatibility).</div>
    </div>

    <script>
        let pc = null;
        let hls = null;
        let ws = null;
        let wsReconnectTimer = null;
        // Currently selected stream data (from API) for WHEP/HLS URLs
        let currentStreamData = null;
        // Currently watching stream ID (for reconnect detection)
        let currentWatchingStreamId = null;

        // Detect environment: if served via nginx (port 3000), use proxy paths
        // Otherwise (direct file open or other port), use direct localhost URLs
        function detectUrls() {
            const loc = window.location;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                document.getElementById('api-url').value = loc.origin + '/api';
            } else {
                document.getElementById('api-url').value = 'http://localhost:8080';
            }
        }
        detectUrls();

        function timeAgo(dateStr) {
            const now = Date.now();
            const then = new Date(dateStr).getTime();
            const secs = Math.floor((now - then) / 1000);
            if (secs < 60) return secs + 's ago';
            const mins = Math.floor(secs / 60);
            if (mins < 60) return mins + ' min ago';
            const hrs = Math.floor(mins / 60);
            return hrs + 'h ago';
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function thumbnailHtml(url) {
            if (url) {
                return '<img class="card-thumb" src="' + escapeHtml(url) + '" alt="thumbnail" />';
            }
            return '<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>';
        }

        function liveThumbnailHtml(url) {
            if (url) {
                return '<img class="card-thumb" data-live="true" data-base-src="' + escapeHtml(url) + '" src="' + escapeHtml(url) + '?t=' + Date.now() + '" alt="thumbnail" />';
            }
            return '<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>';
        }

        // Cache live streams data for URL resolution
        let liveStreamsCache = [];

        function renderLiveStreams(streams) {
            const grid = document.getElementById('live-grid');
            liveStreamsCache = streams || [];
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<div class="live-empty">No live streams right now</div>';
                return;
            }
            grid.innerHTML = streams.map(function(s) {
                var title = s.title || 'Untitled';
                var shortKey = s.stream_key.substring(0, 8);
                var ago = s.started_at ? timeAgo(s.started_at) : '';
                var viewerText = (s.viewer_count !== undefined && s.viewer_count > 0)
                    ? '<span class="card-viewers">' + s.viewer_count + ' watching</span>'
                    : '';
                return '<div class="live-card" data-stream-id="' + s.id + '" onclick="selectStream(\'' + s.stream_key + '\')">' +
                    liveThumbnailHtml(s.thumbnail_url) +
                    '<span class="card-badge badge-live">LIVE</span>' + viewerText +
                    '<div class="card-title">' + escapeHtml(title) + '</div>' +
                    '<div class="card-key">' + shortKey + '</div>' +
                    '<div class="card-time">' + ago + '</div>' +
                    '</div>';
            }).join('');
        }

        function renderVodStreams(streams) {
            const grid = document.getElementById('vod-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<div class="live-empty">No VOD replays available</div>';
                return;
            }
            grid.innerHTML = streams.map(function(s) {
                var title = s.title || 'Untitled';
                var shortKey = s.stream_key.substring(0, 8);
                var ago = s.ended_at ? timeAgo(s.ended_at) : '';
                return '<div class="live-card vod-card" onclick="playVod(\'' + s.stream_key + '\', \'' + escapeHtml(s.hls_url || '') + '\')">' +
                    thumbnailHtml(s.thumbnail_url) +
                    '<span class="card-badge badge-vod">VOD</span>' +
                    '<div class="card-title">' + escapeHtml(title) + '</div>' +
                    '<div class="card-key">' + shortKey + '</div>' +
                    '<div class="card-time">' + ago + '</div>' +
                    '</div>';
            }).join('');
        }

        function updateViewerCount(streamId, count) {
            // Update in-memory cache
            var s = liveStreamsCache.find(function(s) { return s.id === streamId; });
            if (s) s.viewer_count = count;
            // Update DOM
            var card = document.querySelector('.live-card[data-stream-id="' + streamId + '"]');
            if (card) {
                var el = card.querySelector('.card-viewers');
                if (el) {
                    el.textContent = count > 0 ? count + ' watching' : '';
                } else if (count > 0) {
                    var badge = card.querySelector('.card-badge');
                    if (badge) {
                        badge.insertAdjacentHTML('afterend', '<span class="card-viewers">' + count + ' watching</span>');
                    }
                }
            }
        }

        function selectStream(streamKey) {
            document.getElementById('stream-key').value = streamKey;
            // Find the stream in cache to get its URLs
            currentStreamData = liveStreamsCache.find(function(s) { return s.stream_key === streamKey; }) || null;
            watchWHEP();
        }

        function playVod(streamKey, hlsUrl) {
            stopWatching();
            document.getElementById('stream-key').value = streamKey;

            // hls_url is either a full URL (https://storage.googleapis.com/...)
            // or a relative path (/gcs/...). If relative, prepend origin.
            var fullUrl;
            if (hlsUrl.startsWith('http')) {
                fullUrl = hlsUrl;
            } else {
                var loc = window.location;
                fullUrl = (loc.protocol === 'http:' || loc.protocol === 'https:')
                    ? loc.origin + hlsUrl
                    : 'http://localhost:3000' + hlsUrl;
            }

            var video = document.getElementById('player');

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(fullUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    log('VOD playback started.');
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    log('HLS error: ' + data.type + ' - ' + data.details);
                });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: VOD (HLS replay)';
                log('Loading VOD: ' + fullUrl);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = fullUrl;
                video.addEventListener('loadedmetadata', function() { video.play(); });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: VOD (Native HLS)';
                log('Using native HLS for VOD: ' + fullUrl);
            } else {
                log('HLS not supported in this browser.');
            }
        }

        async function fetchVodStreams() {
            var apiUrl = document.getElementById('api-url').value;
            try {
                var res = await fetch(apiUrl + '/v1/streams/vod');
                if (!res.ok) return;
                var json = await res.json();
                renderVodStreams(json.data);
            } catch (e) {
                // silently ignore refresh errors
            }
        }

        let liveThumbnailInterval = null;

        function refreshLiveThumbnails() {
            var grid = document.getElementById('live-grid');
            var imgs = grid.querySelectorAll('img.card-thumb[data-live="true"]');
            var now = Date.now();
            imgs.forEach(function(img) {
                var base = img.getAttribute('data-base-src');
                if (base) {
                    img.src = base + (base.indexOf('?') >= 0 ? '&' : '?') + 't=' + now;
                }
            });
        }

        // --- Auth (for chat) ---
        let accessToken = null;
        let currentChatUser = null;
        let currentChatRoomId = null; // stream_id of the chat room we're in

        function chatSetStatus(msg, isError) {
            var el = document.getElementById('chat-status');
            el.textContent = msg || '';
            el.className = isError ? 'chat-status err' : 'chat-status';
        }

        async function chatLogin() {
            var email = document.getElementById('chat-email').value.trim();
            var pwd = document.getElementById('chat-password').value;
            if (!email || !pwd) { chatSetStatus('Enter email + password', true); return; }
            try {
                var res = await fetch(document.getElementById('api-url').value + '/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: pwd })
                });
                var json = await res.json();
                if (!res.ok) { chatSetStatus('Login failed: ' + (json.error && json.error.message || res.status), true); return; }
                accessToken = json.data.access_token;
                currentChatUser = json.data.user;
                document.getElementById('chat-auth').querySelectorAll('input,button').forEach(function(el){ el.style.display = 'none'; });
                var info = document.getElementById('chat-user-info');
                info.style.display = '';
                info.textContent = 'Logged in as ' + currentChatUser.email;
                document.getElementById('chat-input').disabled = false;
                document.getElementById('chat-input').placeholder = 'Type a message (max 500)';
                document.getElementById('chat-send-btn').disabled = false;
                chatSetStatus('Reconnecting chat as ' + currentChatUser.email + '...');
                // Reconnect WS so server sees the access token.
                reconnectWsForAuth();
            } catch (e) {
                chatSetStatus('Login error: ' + e.message, true);
            }
        }

        function reconnectWsForAuth() {
            if (ws) {
                try { ws.close(); } catch (_) {}
                ws = null;
            }
            connectWs();
        }

        // --- WebSocket ---
        function wsUrl() {
            var loc = window.location;
            var base;
            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                var proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
                base = proto + '//' + loc.host + '/ws';
            } else {
                base = 'ws://localhost:3000/ws';
            }
            if (accessToken) {
                base += (base.indexOf('?') >= 0 ? '&' : '?') + 'token=' + encodeURIComponent(accessToken);
            }
            return base;
        }

        function connectWs() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                return;
            }
            ws = new WebSocket(wsUrl());
            ws.onopen = function() {
                log('WebSocket connected');
                // Subscribe to currently watching stream if any
                if (currentWatchingStreamId) {
                    ws.send(JSON.stringify({ action: 'subscribe', stream_id: currentWatchingStreamId }));
                }
                // Re-subscribe to current chat room if any
                if (currentChatRoomId) {
                    ws.send(JSON.stringify({ action: 'subscribe_chat', stream_id: currentChatRoomId }));
                }
            };
            ws.onmessage = function(e) {
                try {
                    var msg = JSON.parse(e.data);
                    switch (msg.type) {
                        case 'live_streams':
                            renderLiveStreams(msg.data);
                            break;
                        case 'viewer_count':
                            updateViewerCount(msg.stream_id, msg.count);
                            break;
                        case 'reconnect':
                            handleReconnect(msg);
                            break;
                        case 'chat_history':
                            chatRenderHistory(msg.messages || []);
                            break;
                        case 'chat_message':
                            chatAppendMessage(msg.message);
                            break;
                        case 'chat_message_deleted':
                            chatRemoveMessage(msg.msg_id);
                            break;
                        case 'chat_error':
                            chatHandleError(msg.reason);
                            break;
                    }
                } catch (err) {
                    // ignore parse errors
                }
            };
            ws.onclose = function() {
                log('WebSocket disconnected, reconnecting in 3s...');
                wsReconnectTimer = setTimeout(connectWs, 3000);
            };
            ws.onerror = function() {
                // onclose will fire after onerror
            };
        }

        function handleReconnect(msg) {
            if (!currentWatchingStreamId) return;
            if (msg.stream_ids && msg.stream_ids.includes(currentWatchingStreamId)) {
                log('Received reconnect event for current stream. Reconnecting in 3s...');
                setTimeout(function() {
                    var streamKey = document.getElementById('stream-key').value.trim();
                    if (streamKey) {
                        watchWHEP();
                    }
                }, 3000);
            }
        }

        function wsSubscribe(streamId) {
            currentWatchingStreamId = streamId;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'subscribe', stream_id: streamId }));
            }
        }

        function wsUnsubscribe(streamId) {
            if (ws && ws.readyState === WebSocket.OPEN && streamId) {
                ws.send(JSON.stringify({ action: 'unsubscribe', stream_id: streamId }));
            }
            if (currentWatchingStreamId === streamId) {
                currentWatchingStreamId = null;
            }
        }

        // --- Chat ---
        function chatSubscribeRoom(streamId) {
            if (currentChatRoomId && currentChatRoomId !== streamId) {
                chatUnsubscribeRoom(currentChatRoomId);
            }
            currentChatRoomId = streamId;
            // Clear previous messages.
            document.getElementById('chat-messages').innerHTML = '<div class="chat-empty">Loading history...</div>';
            document.getElementById('chat-section').style.display = '';
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'subscribe_chat', stream_id: streamId }));
            }
            if (canModerate()) {
                document.getElementById('bans-section').style.display = '';
                fetchBansList();
            }
        }

        function chatUnsubscribeRoom(streamId) {
            if (!streamId) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'unsubscribe_chat', stream_id: streamId }));
            }
            if (currentChatRoomId === streamId) {
                currentChatRoomId = null;
            }
        }

        function chatRenderHistory(messages) {
            var box = document.getElementById('chat-messages');
            box.innerHTML = '';
            if (!messages.length) {
                box.innerHTML = '<div class="chat-empty">No messages yet.</div>';
                return;
            }
            messages.forEach(function(m) { chatAppendMessage(m, true); });
            box.scrollTop = box.scrollHeight;
        }

        function canModerate() {
            if (!currentChatUser) return false;
            if (currentChatUser.role === 'admin') return true;
            return false;
        }

        function chatAppendMessage(m, suppressScroll) {
            if (!m) return;
            if (currentChatRoomId && m.stream_id && m.stream_id !== currentChatRoomId) return;
            var box = document.getElementById('chat-messages');
            var empty = box.querySelector('.chat-empty');
            if (empty) empty.remove();
            var row = document.createElement('div');
            row.className = 'chat-msg';
            if (m.id) row.setAttribute('data-msg-id', m.id);
            if (m.user_id) row.setAttribute('data-user-id', m.user_id);
            var nameSpan = document.createElement('span');
            nameSpan.className = 'cm-name';
            nameSpan.textContent = (m.display_name || 'anon') + ':';
            var bodySpan = document.createElement('span');
            bodySpan.className = 'cm-body';
            bodySpan.textContent = m.content || '';
            row.appendChild(nameSpan);
            row.appendChild(bodySpan);
            if (canModerate() && m.id) {
                var actions = document.createElement('span');
                actions.className = 'cm-actions';
                var delBtn = document.createElement('button');
                delBtn.textContent = 'X';
                delBtn.title = 'Delete message';
                delBtn.onclick = function() { chatDeleteMessage(m.id); };
                actions.appendChild(delBtn);
                if (m.user_id && currentChatUser && m.user_id !== currentChatUser.id) {
                    var banBtn = document.createElement('button');
                    banBtn.textContent = 'Ban';
                    banBtn.onclick = function(e) { showBanMenu(e, m.user_id, m.display_name); };
                    actions.appendChild(banBtn);
                }
                row.appendChild(actions);
            }
            box.appendChild(row);
            if (!suppressScroll) box.scrollTop = box.scrollHeight;
        }

        function showToast(msg) {
            var el = document.getElementById('chat-toast');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 4000);
        }

        function chatRemoveMessage(msgId) {
            var el = document.querySelector('.chat-msg[data-msg-id="' + msgId + '"]');
            if (el) el.remove();
        }

        function chatDeleteMessage(msgId) {
            if (!currentChatRoomId) return;
            fetch(document.getElementById('api-url').value + '/v1/streams/' + currentChatRoomId + '/chat/messages/' + msgId, {
                method: 'DELETE', headers: { 'Authorization': 'Bearer ' + accessToken }
            }).then(function(res) {
                if (!res.ok) chatSetStatus('Delete failed: ' + res.status, true);
            });
        }

        var activeBanMenu = null;
        function showBanMenu(e, userId, displayName) {
            closeBanMenu();
            var menu = document.createElement('div');
            menu.className = 'ban-menu';
            var opts = [{label:'10 min', secs:600},{label:'1 hour', secs:3600},{label:'1 day', secs:86400},{label:'Permanent', secs:null}];
            opts.forEach(function(opt) {
                var btn = document.createElement('button');
                btn.textContent = opt.label;
                btn.onclick = function() { doBan(userId, opt.secs); closeBanMenu(); };
                menu.appendChild(btn);
            });
            e.target.closest('.chat-msg').appendChild(menu);
            activeBanMenu = menu;
            setTimeout(function() {
                document.addEventListener('click', closeBanMenuOnOutside, {once:true});
            }, 0);
        }
        function closeBanMenu() { if (activeBanMenu) { activeBanMenu.remove(); activeBanMenu = null; } }
        function closeBanMenuOnOutside(e) { if (activeBanMenu && !activeBanMenu.contains(e.target)) closeBanMenu(); }

        function doBan(userId, durationSecs) {
            if (!currentChatRoomId) return;
            fetch(document.getElementById('api-url').value + '/v1/streams/' + currentChatRoomId + '/chat/bans', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
                body: JSON.stringify({ user_id: userId, duration_secs: durationSecs })
            }).then(function(res) {
                if (res.ok) { chatSetStatus('User banned.'); fetchBansList(); }
                else res.json().then(function(j) { chatSetStatus('Ban failed: ' + (j.error && j.error.message || res.status), true); });
            });
        }

        var bansCountdownInterval = null;
        function toggleBansList() {
            var el = document.getElementById('bans-list');
            if (el.style.display === 'none') { el.style.display = ''; fetchBansList(); }
            else el.style.display = 'none';
        }

        function fetchBansList() {
            if (!currentChatRoomId) return;
            fetch(document.getElementById('api-url').value + '/v1/streams/' + currentChatRoomId + '/chat/bans', {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            })
            .then(function(res) { return res.json(); })
            .then(function(json) { renderBansList(json.data || []); });
        }

        function renderBansList(bans) {
            var el = document.getElementById('bans-list');
            if (bansCountdownInterval) { clearInterval(bansCountdownInterval); bansCountdownInterval = null; }
            if (!bans.length) { el.innerHTML = '<div style="color:#666;padding:4px 0;">No bans</div>'; return; }
            el.innerHTML = '';
            bans.forEach(function(b) {
                var row = document.createElement('div');
                row.className = 'ban-entry';
                row.setAttribute('data-ban-user', b.user_id);
                var info = document.createElement('span');
                info.className = 'ban-info';
                info.textContent = b.display_name || b.user_id.slice(0,8);
                var ttl = document.createElement('span');
                ttl.className = 'ban-ttl';
                if (b.expires_at) {
                    var remaining = Math.max(0, Math.floor((new Date(b.expires_at).getTime() - Date.now()) / 1000));
                    ttl.setAttribute('data-remaining', remaining);
                    ttl.textContent = formatCountdown(remaining);
                } else {
                    ttl.textContent = 'Permanent';
                }
                var btn = document.createElement('button');
                btn.textContent = 'Unban';
                btn.onclick = function() { doUnban(b.user_id); };
                row.appendChild(info);
                row.appendChild(ttl);
                row.appendChild(btn);
                el.appendChild(row);
            });
            bansCountdownInterval = setInterval(updateBansCountdown, 1000);
        }

        function formatCountdown(secs) {
            if (secs <= 0) return 'Expired';
            var h = Math.floor(secs / 3600);
            var m = Math.floor((secs % 3600) / 60);
            var s = secs % 60;
            if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            return m + ':' + String(s).padStart(2,'0');
        }

        function updateBansCountdown() {
            document.querySelectorAll('.ban-ttl[data-remaining]').forEach(function(el) {
                var r = parseInt(el.getAttribute('data-remaining'), 10) - 1;
                if (r <= 0) { el.closest('.ban-entry').remove(); return; }
                el.setAttribute('data-remaining', r);
                el.textContent = formatCountdown(r);
            });
        }

        function doUnban(userId) {
            if (!currentChatRoomId) return;
            fetch(document.getElementById('api-url').value + '/v1/streams/' + currentChatRoomId + '/chat/bans/' + userId, {
                method: 'DELETE', headers: { 'Authorization': 'Bearer ' + accessToken }
            }).then(function(res) {
                if (res.ok) {
                    var row = document.querySelector('.ban-entry[data-ban-user="' + userId + '"]');
                    if (row) row.remove();
                    chatSetStatus('User unbanned.');
                } else chatSetStatus('Unban failed: ' + res.status, true);
            });
        }

        function chatHandleError(reason) {
            var msg;
            switch (reason) {
                case 'RATE_LIMITED': msg = 'Slow down — 1 message per second.'; break;
                case 'TOO_LONG': msg = 'Message too long or empty.'; break;
                case 'UNAUTHORIZED': msg = 'Please log in to send messages.'; break;
                case 'UNKNOWN_STREAM': msg = 'Stream is not live.'; break;
                case 'BANNED': msg = 'You are banned from this chat.'; showToast(msg); break;
                default: msg = 'Chat error: ' + reason;
            }
            chatSetStatus(msg, true);
            setTimeout(function() {
                var el = document.getElementById('chat-status');
                if (el.textContent === msg) chatSetStatus('');
            }, 3000);
        }

        function sendChat() {
            var input = document.getElementById('chat-input');
            var content = input.value;
            if (!content.trim()) return;
            if (!currentChatRoomId) { chatSetStatus('Start watching a stream first.', true); return; }
            if (!accessToken) { chatSetStatus('Please log in first.', true); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { chatSetStatus('Disconnected.', true); return; }
            ws.send(JSON.stringify({ action: 'send_chat', stream_id: currentChatRoomId, content: content }));
            input.value = '';
        }

        // Initial fetch: VOD via REST (not pushed by WS), live streams come from WS
        fetchVodStreams();
        // Refresh VOD list periodically (VODs don't change often)
        setInterval(fetchVodStreams, 30000);
        // Refresh live thumbnails every 30 seconds
        liveThumbnailInterval = setInterval(refreshLiveThumbnails, 30000);
        // Connect WebSocket (live streams pushed from server)
        connectWs();

        function log(msg) {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleTimeString();
            el.textContent += '\n[' + ts + '] ' + msg;
            el.scrollTop = el.scrollHeight;
        }

        function stopWatching() {
            if (currentWatchingStreamId) {
                wsUnsubscribe(currentWatchingStreamId);
            }
            if (currentChatRoomId) {
                chatUnsubscribeRoom(currentChatRoomId);
            }
            document.getElementById('chat-section').style.display = 'none';
            if (pc) { pc.close(); pc = null; }
            if (hls) { hls.destroy(); hls = null; }
            const video = document.getElementById('player');
            video.srcObject = null;
            video.src = '';
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('mode-info').textContent = '';
            log('Stopped watching.');
        }

        async function watchWHEP() {
            stopWatching();
            const streamKey = document.getElementById('stream-key').value.trim();
            if (!streamKey) { log('Please enter a stream key.'); return; }

            // Always prefer liveStreamsCache (WS-updated) over stale currentStreamData.
            // After MTX migration, WS pushes new live_streams with new URLs — cache is fresh,
            // but currentStreamData still holds old snapshot pointing to the dead MTX.
            var found = liveStreamsCache.find(function(s) { return s.stream_key === streamKey; });
            if (!found || !found.urls || !found.urls.whep) {
                log('Cannot find WHEP URL for this stream. Make sure the stream is live.');
                return;
            }
            currentStreamData = found;
            var whepUrl = found.urls.whep;

            // Subscribe to viewer count for this stream
            if (currentStreamData && currentStreamData.id) {
                wsSubscribe(currentStreamData.id);
                chatSubscribeRoom(currentStreamData.id);
            }

            try {
                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                pc.addTransceiver('video', { direction: 'recvonly' });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                pc.ontrack = (event) => {
                    log('Received track: ' + event.track.kind);
                    document.getElementById('player').srcObject = event.streams[0];
                };

                pc.onconnectionstatechange = function() {
                    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                        log('WebRTC disconnected, reconnecting in 3s...');
                        setTimeout(function() {
                            var sk = document.getElementById('stream-key').value.trim();
                            if (sk) watchWHEP();
                        }, 3000);
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Wait for ICE gathering
                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') { resolve(); return; }
                    pc.addEventListener('icegatheringstatechange', () => {
                        if (pc.iceGatheringState === 'complete') resolve();
                    });
                });

                log('Sending WHEP offer...');
                const res = await fetch(whepUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });

                if (!res.ok) {
                    log('WHEP error: ' + res.status + ' ' + await res.text());
                    return;
                }

                const answerSdp = await res.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: WHEP (WebRTC, low latency)';
                log('Connected via WHEP.');
            } catch (e) {
                log('WHEP error: ' + e.message);
            }
        }

        async function watchHLS() {
            stopWatching();
            const streamKey = document.getElementById('stream-key').value.trim();
            if (!streamKey) { log('Please enter a stream key.'); return; }

            // Always prefer liveStreamsCache (WS-updated) to avoid stale URLs after MTX migration.
            var found = liveStreamsCache.find(function(s) { return s.stream_key === streamKey; });
            if (!found || !found.urls || !found.urls.hls) {
                log('Cannot find HLS URL for this stream. Make sure the stream is live.');
                return;
            }
            currentStreamData = found;
            var hlsUrl = found.urls.hls;

            // Subscribe to viewer count for this stream
            if (currentStreamData && currentStreamData.id) {
                wsSubscribe(currentStreamData.id);
                chatSubscribeRoom(currentStreamData.id);
            }

            const video = document.getElementById('player');

            if (Hls.isSupported()) {
                hls = new Hls({
                    lowLatencyMode: true,
                    liveSyncDurationCount: 3,
                });
                hls.loadSource(hlsUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    log('HLS playback started.');
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    log('HLS error: ' + data.type + ' - ' + data.details);
                });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: HLS (LL-HLS, compatible)';
                log('Connecting via HLS: ' + hlsUrl);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = hlsUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); });
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('mode-info').textContent = 'Mode: Native HLS (Safari)';
                log('Using native HLS: ' + hlsUrl);
            } else {
                log('HLS not supported in this browser.');
            }
        }
    </script>
</body>
