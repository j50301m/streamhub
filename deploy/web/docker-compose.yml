services:
  web:
    build:
      context: ../..
      dockerfile: deploy/web/Dockerfile.web
    container_name: streamhub-web
    # No host port mapping — nginx (in infra compose) proxies /broadcaster/
    # and /viewer/ to web:8080 via the shared docker network.
    expose:
      - "8080"

networks:
  default:
    name: streamhub
    external: true
