apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bo-api
  labels:
    app.kubernetes.io/part-of: streamhub
    app.kubernetes.io/name: bo-api
spec:
  parentRefs:
    - name: streamhub
      sectionName: https-admin
  hostnames:
    - admin.streamhub.com
  rules:
    # Admin API — only /api/v1/ is public. Scoping to /v1/ (not /) keeps
    # internal-only endpoints like /metrics and /healthz off the public LB;
    # they stay reachable from in-cluster Prometheus/health checkers via the
    # Service DNS and are blocked by NetworkPolicy for everyone else.
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1/
      backendRefs:
        - name: bo-api
          port: 8800
    # Admin SPA assets served by the web container under /admin/.
    - matches:
        - path:
            type: PathPrefix
            value: /admin/
      backendRefs:
        - name: web
          port: 8080
