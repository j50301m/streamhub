apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  labels:
    app.kubernetes.io/part-of: streamhub
    app.kubernetes.io/name: api
spec:
  parentRefs:
    - name: streamhub
      sectionName: https-api
  hostnames:
    - api.streamhub.com
  # Allowlist public path prefixes. Anything that does not match one of these
  # (e.g. `/internal/*`, `/metrics`) is not routed by the Gateway and returns
  # 404 automatically — this is the Gateway API idiom for path-scoped exposure.
  # Internal endpoints are additionally defended at the pod level by the
  # per-app NetworkPolicy (see deploy/gke/base/networkpolicy/api.yaml).
  rules:
    - matches:
        - path:
            type: Exact
            value: /healthz
        - path:
            type: PathPrefix
            value: /v1/
      backendRefs:
        - name: api
          port: 8080
