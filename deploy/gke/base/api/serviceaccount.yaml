apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: streamhub
  annotations:
    # Bound to GSA streamhub-api@<project>.iam.gserviceaccount.com via Terraform IAM binding.
    # The `iam.gke.io/gcp-service-account` value is injected by the overlay per environment.
    iam.gke.io/gcp-service-account: PLACEHOLDER
