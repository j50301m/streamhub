apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resources consumed by each environment overlay.
# Overlays inject namespace, image tags, environment-specific ConfigMap patches,
# and the correct Workload Identity GSA annotation on each ServiceAccount.

labels:
  - pairs:
      app.kubernetes.io/part-of: streamhub
    includeSelectors: false

resources:
  - api
  - bo-api
  - web
  - gateway
  - networkpolicy
  - eso
