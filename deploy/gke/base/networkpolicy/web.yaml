apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16
        - ipBlock:
            cidr: 130.211.0.0/22
        - ipBlock:
            cidr: 34.96.0.0/20
      ports:
        - protocol: TCP
          port: 8080
  # Web only serves static files; DNS egress is allowed via the cluster-wide allow-dns policy.
