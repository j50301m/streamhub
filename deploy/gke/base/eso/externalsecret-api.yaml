apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-env
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: streamhub
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: api-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        DATABASE_URL: "{{ .database_url }}"
        REDIS_URL: "{{ .redis_url }}"
        JWT_SECRET: "{{ .jwt_secret }}"
        GCS_BUCKET: "{{ .gcs_bucket }}"
        TRANSCODER_PROJECT_ID: "{{ .transcoder_project_id }}"
        PUBSUB_VERIFY_TOKEN: "{{ .pubsub_verify_token }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: streamhub-api-database-url
    - secretKey: redis_url
      remoteRef:
        key: streamhub-redis-url
    - secretKey: jwt_secret
      remoteRef:
        key: streamhub-jwt-secret
    - secretKey: gcs_bucket
      remoteRef:
        key: streamhub-gcs-bucket
    - secretKey: transcoder_project_id
      remoteRef:
        key: streamhub-transcoder-project-id
    - secretKey: pubsub_verify_token
      remoteRef:
        key: streamhub-pubsub-verify-token
