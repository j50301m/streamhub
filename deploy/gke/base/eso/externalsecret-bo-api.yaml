apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bo-api-env
  labels:
    app.kubernetes.io/name: bo-api
    app.kubernetes.io/part-of: streamhub
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: bo-api-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        DATABASE_URL: "{{ .database_url }}"
        REDIS_URL: "{{ .redis_url }}"
        JWT_SECRET: "{{ .jwt_secret }}"
  # BO_API_CORS_ORIGINS is not a secret; it lives in the ConfigMap
  # (see deploy/gke/{prod,staging}/patches/bo-api-config.yaml).
  data:
    - secretKey: database_url
      remoteRef:
        key: streamhub-api-database-url
    - secretKey: redis_url
      remoteRef:
        key: streamhub-redis-url
    - secretKey: jwt_secret
      remoteRef:
        key: streamhub-jwt-secret
