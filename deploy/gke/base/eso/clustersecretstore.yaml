apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      # Project ID is environment-specific; overlays patch this via ConfigMap substitution.
      projectID: REPLACE_ME_PROJECT_ID
      auth:
        workloadIdentity:
          clusterLocation: asia-east1
          clusterName: streamhub-prod
          serviceAccountRef:
            # Uses the cluster-scoped ESO controller SA (installed via Helm chart or operator bundle).
            name: external-secrets
            namespace: external-secrets
