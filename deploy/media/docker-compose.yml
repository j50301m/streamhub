services:
  mtx-1:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: streamhub-mtx-1
    hostname: mtx-1
    environment:
      MTX_NAME: mtx-1
      WEBRTC_UDP_PORT: "8189"
    ports:
      - "8554:8554"       # RTSP
      - "8888:8888"       # HLS
      - "8889:8889"       # WebRTC HTTP
      - "8189:8189/udp"   # WebRTC ICE UDP (must match WEBRTC_UDP_PORT)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings

  mtx-2:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: streamhub-mtx-2
    hostname: mtx-2
    environment:
      MTX_NAME: mtx-2
      WEBRTC_UDP_PORT: "8199"
    ports:
      - "8564:8554"
      - "8898:8888"
      - "8899:8889"
      - "8199:8199/udp"   # internal == host so ICE candidates work
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings

  mtx-3:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: streamhub-mtx-3
    hostname: mtx-3
    environment:
      MTX_NAME: mtx-3
      WEBRTC_UDP_PORT: "8209"
    ports:
      - "8574:8554"
      - "8908:8888"
      - "8909:8889"
      - "8209:8209/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings

volumes:
  recordings:
    external: true

networks:
  default:
    name: streamhub
    external: true
