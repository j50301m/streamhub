# MediaMTX configuration for streamhub
# Docs: https://github.com/bluenviron/mediamtx

###############################################
# Global settings

logLevel: info

###############################################
# API settings

api: yes
apiAddress: :9997
apiAllowOrigins: ['*']

###############################################
# Authentication settings

authMethod: http
authHTTPAddress: http://api:8080/internal/auth

###############################################
# WebRTC settings

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :__WEBRTC_UDP_PORT__
webrtcLocalTCPAddress: :__WEBRTC_UDP_PORT__
webrtcAllowOrigins: ['*']
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

###############################################
# HLS settings

hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsAllowOrigins: ['*']

###############################################
# Path settings

paths:
  # Only accept UUID v4 format stream keys
  "~^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$":
    # Webhook when stream becomes ready (published).
    # __MTX_NAME__ is replaced at container startup by the entrypoint script.
    # $MTX_QUERY forwards the WHIP URL's query string (contains session={uuid})
    # so the API can match this event to the session that POST /token created.
    runOnReady: >
      curl -s -X POST "http://api:8080/internal/hooks/publish?mtx=__MTX_NAME__&query=$MTX_QUERY"
      -H "Content-Type: application/json"
      -d '{"stream_key":"$MTX_PATH","action":"publish"}'

    # Webhook when stream becomes unavailable (unpublished)
    runOnNotReady: >
      curl -s -X POST "http://api:8080/internal/hooks/publish?mtx=__MTX_NAME__&query=$MTX_QUERY"
      -H "Content-Type: application/json"
      -d '{"stream_key":"$MTX_PATH","action":"unpublish"}'

    # Recording
    record: yes
    recordFormat: fmp4
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S

    # Webhook when a recording segment is complete
    runOnRecordSegmentComplete: >
      curl -s -X POST http://api:8080/internal/hooks/recording
      -H "Content-Type: application/json"
      -d '{"stream_key":"$MTX_PATH","segment_path":"$MTX_SEGMENT_PATH"}'
