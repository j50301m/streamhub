server {
    listen 3000;
    listen 3443 ssl;
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    server_name localhost;

    # Broadcaster static files
    location /broadcaster/ {
        alias /usr/share/nginx/html/broadcaster/;
        try_files $uri $uri/ /broadcaster/index.html;
    }

    # Viewer static files
    location /viewer/ {
        alias /usr/share/nginx/html/viewer/;
        try_files $uri $uri/ /viewer/index.html;
    }

    # API reverse proxy (strip /api prefix)
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MediaMTX WebRTC (WHIP/WHEP) reverse proxy (strip /mediamtx prefix)
    location /mediamtx/ {
        proxy_pass http://mediamtx:8889/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HLS reverse proxy (strip /hls prefix)
    location /hls/ {
        proxy_pass http://mediamtx:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root redirect to viewer
    location = / {
        return 302 /viewer/;
    }
}
