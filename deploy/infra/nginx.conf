server {
    listen 3000;

    # Docker internal DNS — resolve upstream at request time, not startup.
    # This allows nginx to start before api/web containers are ready.
    resolver 127.0.0.11 valid=10s;

    # API reverse proxy (strip /api/ prefix)
    location /api/ {
        set $upstream_api http://api:8080;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Versioned API endpoints (pass through as-is)
    location /v1/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket
    location /ws {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Static frontend
    location /broadcaster/ {
        set $upstream_web http://web:8080;
        proxy_pass $upstream_web$request_uri;
    }

    location /viewer/ {
        set $upstream_web http://web:8080;
        proxy_pass $upstream_web$request_uri;
    }

    # Live thumbnails
    location /thumbnails/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # VOD proxy (fake-gcs-server for local dev, CDN for prod)
    # /vod/{object_path} → fake-gcs JSON API with hardcoded bucket
    # NOTE: bucket name is hardcoded for local dev; prod should use envsubst or CDN URL
    location ~ ^/vod/(.+)$ {
        set $upstream_gcs http://fake-gcs:4443;
        set $object_path $1;
        proxy_pass $upstream_gcs/storage/v1/b/streamhub-recordings-dev/o/$object_path?alt=media;
        proxy_set_header Host $host;
    }

    # Root redirect to viewer
    location = / {
        return 302 /viewer/;
    }
}
