server {
    listen 3000;

    # API reverse proxy (strip /api prefix)
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Versioned API endpoints
    location /v1/ {
        proxy_pass http://api:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket
    location /ws {
        proxy_pass http://api:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Static frontend
    location /broadcaster/ {
        proxy_pass http://web:8080/broadcaster/;
    }

    location /viewer/ {
        proxy_pass http://web:8080/viewer/;
    }

    # Live thumbnails
    location /thumbnails/ {
        proxy_pass http://api:8080/thumbnails/;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # VOD HLS
    location /vod/ {
        proxy_pass http://api:8080/vod/;
    }

    # Root redirect to viewer
    location = / {
        return 302 /viewer/;
    }
}
