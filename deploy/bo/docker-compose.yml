services:
  bo-api:
    build:
      context: ../..
      dockerfile: deploy/bo/Dockerfile.bo-api
    container_name: streamhub-bo-api
    env_file: .env
    expose:
      - "8800"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8800/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  default:
    name: streamhub
    external: true
