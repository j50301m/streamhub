services:
  postgres:
    image: postgres:17
    container_name: streamhub-postgres
    environment:
      POSTGRES_USER: streamhub
      POSTGRES_PASSWORD: streamhub
      POSTGRES_DB: streamhub
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: streamhub-mediamtx
    ports:
      - "8554:8554"       # RTSP
      - "8000:8000/udp"   # RTP
      - "8001:8001/udp"   # RTCP
      - "8888:8888"       # HLS
      - "8889:8889"       # WebRTC (HTTP)
      - "8189:8189/udp"   # WebRTC ICE (UDP)
      - "8189:8189/tcp"   # WebRTC ICE (TCP)
      - "9997:9997"       # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
