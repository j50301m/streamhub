services:
  postgres:
    image: postgres:17
    container_name: streamhub-postgres
    environment:
      POSTGRES_USER: streamhub
      POSTGRES_PASSWORD: streamhub
      POSTGRES_DB: streamhub
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: streamhub-api
    environment:
      DATABASE_URL: postgres://streamhub:streamhub@postgres:5432/streamhub
      JWT_SECRET: dev-secret-change-in-production
      RECORDINGS_PATH: /recordings
      MEDIAMTX_URL: http://mediamtx:9997
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy

  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: streamhub-mediamtx
    ports:
      - "8554:8554"       # RTSP
      - "8000:8000/udp"   # RTP
      - "8001:8001/udp"   # RTCP
      - "8888:8888"       # HLS
      - "8889:8889"       # WebRTC (HTTP)
      - "8189:8189/udp"   # WebRTC ICE (UDP)
      - "8189:8189/tcp"   # WebRTC ICE (TCP)
      - "9997:9997"       # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: streamhub-web
    ports:
      - "3000:3000"
      - "3443:3443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - mediamtx

volumes:
  pgdata:
