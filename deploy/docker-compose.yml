services:
  postgres:
    image: postgres:17
    container_name: streamhub-postgres
    environment:
      POSTGRES_USER: streamhub
      POSTGRES_PASSWORD: streamhub
      POSTGRES_DB: streamhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: streamhub-mediamtx
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
