services:
  api:
    build:
      context: ../..
      dockerfile: deploy/app/Dockerfile.api
    container_name: streamhub-api
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - recordings:/recordings
      - thumbnails:/thumbnails
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  recordings:
    external: true
  thumbnails:
    external: true

networks:
  default:
    name: streamhub
    external: true
